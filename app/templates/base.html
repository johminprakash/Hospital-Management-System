<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        input[type="radio"]{
            accent-color: red;
            vertical-align: top;
        }
        
        .header{
            background-color: red;
            color:black;
            padding:20px;
        }

        h1{
            text-align: center;
        }
        h2{
            text-align: center;
            color:red
        }
        h3{
            color:white;
        }

        label{
            color:white;
            font-size: medium;
        }
        input{
            height: 25px;
        }
        .container{
            padding:20px;
            margin: 50px;
            border: 10px;
            border-color: red;
            border-style: solid;
            background-color:black;
            color:red;
        }
        .bordered{
            border:2px solid white;
            margin: auto;
            text-align: center;
        }
    </style>

</head>
<body>
    
    <div class="header">
        <h1>Hospital Management System</h1>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
