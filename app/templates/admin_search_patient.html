{% extends 'base.html' %}
{% block content %}
<h2 style="text-align:center;">Search Patient</h2>
<form method="POST" style="text-align:center;">
    <label style="display: inline-block;">Patient Name:</label>
    <input type="text" id="search_name" name="name"><br><br>
    <button type="submit">Search</button>
</form>
<br>
{% if res %}
<table class="bordered" style="margin:auto;">
    <tr>
        <th class="bordered">Name</th>
        <th class="bordered">Gender</th>
        <th class="bordered">Age</th>
        <th class="bordered">Phone</th>
    </tr>
    {% for r in res %}
    <tr>
        <td class="bordered">{{r[0]}}</td>
        <td class="bordered">{{r[1]}}</td>
        <td class="bordered">{{r[2]}}</td>
        <td class="bordered">{{r[3]}}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}
{% endblock %}
